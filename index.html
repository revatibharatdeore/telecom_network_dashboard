<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telecom Network Monitoring Dashboard</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
        }
        header {
            background-color: #1e293b;
            color: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        h1 { margin: 0; font-size: 24px; }
        .tag {
            background-color: #3b82f6;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border-left: 5px solid #cbd5e1;
        }
        .card.Online { border-left-color: #10b981; }
        .card.Warning { border-left-color: #f59e0b; }
        .card.Offline { border-left-color: #ef4444; }
        
        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
        }
        .Online .status-badge { background: #d1fae5; color: #065f46; }
        .Warning .status-badge { background: #fef3c7; color: #92400e; }
        .Offline .status-badge { background: #fee2e2; color: #991b1b; }

        .device-id { color: #64748b; font-size: 12px; margin-bottom: 5px; }
        .device-name { font-size: 18px; font-weight: bold; margin: 0 0 10px 0; }
        
        .metric {
            display: flex;
            justify-content: space-between;
            margin: 8px 0;
            font-size: 14px;
        }
        .metric-label { color: #64748b; }
        .metric-value { font-weight: 600; }
        
        .refresh-indicator {
            text-align: right;
            font-size: 12px;
            color: #64748b;
            margin-top: -10px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h1>Telecom Network Node Analyzer</h1>
            <div style="font-size: 13px; color: #94a3b8; margin-top: 5px;">Full-Stack EXTC Telemetry Application</div>
        </div>
        <span class="tag">Live Monitoring</span>
    </header>

    <div class="refresh-indicator" id="refresh-time">Loading metrics...</div>

    <div class="grid" id="dashboard-grid">
        </div>
</div>

<script>
    async function fetchNetworkData() {
        try {
            const response = await fetch('/api/network-status');
            const devices = await response.json();
            
            const grid = document.getElementById('dashboard-grid');
            grid.innerHTML = ''; // Clear old data
            
            devices.forEach(device => {
                const card = document.createElement('div');
                card.className = `card ${device.status}`;
                
                card.innerHTML = `
                    <div class="device-id">${device.id} | IP: ${device.ip}</div>
                    <div class="device-name">${device.name}</div>
                    <div style="margin-bottom: 15px;">
                        <span class="status-badge">${device.status}</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">Latency (RTT):</span>
                        <span class="metric-value">${device.status === 'Offline' ? 'N/A' : device.latency + ' ms'}</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">Packet Loss:</span>
                        <span class="metric-value">${device.packetLoss}%</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">Bandwidth Load:</span>
                        <span class="metric-value">${device.status === 'Offline' ? '0' : device.bandwidth}%</span>
                    </div>
                `;
                grid.appendChild(card);
            });

            document.getElementById('refresh-time').innerText = `Last polled backend at: ${new Date().toLocaleTimeString()}`;
        } catch (error) {
            console.error("Error fetching telemetry data:", error);
            document.getElementById('refresh-time').innerText = "Error connecting to backend server.";
        }
    }

    // Poll the backend every 3 seconds for updated telecom telemetry data
    fetchNetworkData();
    setInterval(fetchNetworkData, 3000);
</script>
</body>
</html>
